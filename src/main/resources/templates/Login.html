<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to BiteBoard — Admin or Customer access portal.">
    <title>BiteBoard — Login</title>
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="" th:href="@{/css/Navigation.css}">
    <link rel="stylesheet" href="" th:href="@{/css/Login.css}">
</head>
<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>

    <div class="LoginContainer">

        <!-- Admin Login Panel -->
        <div class="admin">
            <div class="content">
                <div class="panel-icon">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <p class="panel-label">Business</p>
                <h2>Admin <span>Portal</span></h2>

                <form th:action="@{/adminLogin}" method="post">
                    <div class="field-group">
                        <label class="field-label" for="adminEmail">Email Address</label>
                        <input type="email" id="adminEmail" name="email" placeholder="admin@foodfrenzy.com">
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="adminPass">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="adminPass" name="password" placeholder="Enter password">
                            <button type="button" class="toggle-pass" onclick="togglePassword('adminPass', this)">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <small class="error-msg" th:text="${error}"></small>
                    </div>
                    <button type="submit" class="loginButton">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>&nbsp; Sign In as Admin
                    </button>
                </form>
            </div>
        </div>

        <!-- User Login Panel -->
        <div class="user">
            <div class="content">
                <div class="panel-icon">
                    <i class="fa-solid fa-user"></i>
                </div>
                <p class="panel-label">Customer</p>
                <h2>User <span>Portal</span></h2>

                <form th:action="@{/userLogin}" method="post">
                    <div class="field-group">
                        <label class="field-label" for="userEmail">Email Address</label>
                        <input type="email" id="userEmail" name="userEmail" placeholder="you@email.com">
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="userPass">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="userPass" name="userPassword" placeholder="Enter password" maxlength="8" minlength="4">
                            <button type="button" class="toggle-pass" onclick="togglePassword('userPass', this)">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <small class="error-msg" th:text="${error2}"></small>
                    </div>
                    <button type="submit" class="loginButton">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>&nbsp; Sign In as User
                    </button>
                </form>

                <div class="register-link">
                    Don't have an account? <a th:href="@{/register}">Register Here</a>
                </div>
            </div>
        </div>

    </div>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
