<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBoard — Add Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="" th:href="@{/css/forms.css}">
</head>
<body>
    <a href="/admin/services" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

    <div class="addAdmin">
        <div class="form-icon"><i class="fa-solid fa-user-shield"></i></div>
        <h3>Add New <span>Admin</span></h3>
        <p class="form-subtitle">Create a new admin account with dashboard access.</p>
        <hr class="form-divider">

        <form th:action="@{/addingAdmin}" method="post">
            <div class="field-group">
                <label for="adminName">Full Name</label>
                <input type="text" id="adminName" name="adminName" placeholder="Enter full name" minlength="2" required>
            </div>
            <div class="field-group">
                <label for="adminEmail">Email Address</label>
                <input type="email" id="adminEmail" name="adminEmail" placeholder="admin@biteboard.com" required>
            </div>
            <div class="field-group">
                <label for="adminNumber">Phone Number</label>
                <input type="tel" id="adminNumber" name="adminNumber" placeholder="10-digit number" pattern="[0-9]{10}" required>
            </div>
            <div class="field-group">
                <label for="adminPassword">Password</label>
                <input type="password" id="adminPassword" name="adminPassword" placeholder="Set a password" required>
            </div>
            <button type="submit">
                <i class="fa-solid fa-user-plus"></i> Add Admin
            </button>
        </form>
    </div>
</body>
</html>
