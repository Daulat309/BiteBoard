<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBoard — Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap');
        :root {
            --bg: #0d0d0d; --card: #161616; --border: rgba(255,255,255,0.07);
            --primary: #e8572a; --text: #f0f0f0; --muted: rgba(255,255,255,0.45);
            --green: #22c55e;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Top bar */
        .top-bar {
            background: #111; border-bottom: 1px solid var(--border);
            padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .welcome-msg { font-size: 0.95rem; color: var(--muted); }
        .welcome-msg span { color: var(--primary); font-weight: 700; font-family: 'Poppins', sans-serif; }
        .logout-link {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 8px 16px; border-radius: 8px;
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
            color: #f87171; font-size: 0.85rem; font-weight: 600; text-decoration: none;
            transition: all 0.22s;
        }
        .logout-link:hover { background: rgba(239,68,68,0.16); }

        /* Main layout */
        .shop-main { max-width: 1100px; margin: 0 auto; padding: 36px 28px; }

        /* Search card */
        .search-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px; margin-bottom: 28px;
        }
        .search-card h2 {
            font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 700;
            margin-bottom: 16px; display: flex; align-items: center; gap: 9px;
        }
        .search-card h2 i { color: var(--primary); }

        .search-row { display: flex; gap: 12px; }
        .search-row input {
            flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px;
            color: var(--text); font-size: 0.93rem; font-family: 'Inter', sans-serif; outline: none;
            transition: border-color 0.2s;
        }
        .search-row input:focus { border-color: var(--primary); }
        .search-row input::placeholder { color: rgba(255,255,255,0.25); }
        .search-row button {
            padding: 12px 22px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), #c43e14);
            color: white; font-weight: 600; font-size: 0.92rem;
            font-family: 'Inter', sans-serif; cursor: pointer;
            display: flex; align-items: center; gap: 7px;
            transition: all 0.22s; box-shadow: 0 4px 14px rgba(232,87,42,0.3);
        }
        .search-row button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,87,42,0.45); }

        .error-msg { color: #f87171; font-size: 0.85rem; margin-top: 10px; display: flex; align-items: center; gap: 6px; }

        /* Product result */
        .product-result {
            background: rgba(232,87,42,0.07); border: 1px solid rgba(232,87,42,0.2);
            border-radius: 16px; padding: 24px; margin-top: 20px;
        }
        .product-result h3 { font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
        .product-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
        .p-field label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 5px; }
        .p-field input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'Inter',sans-serif;
            font-size: 0.92rem; outline: none;
        }
        .p-field input:not([readonly]):focus { border-color: var(--primary); }
        .order-btn {
            display: flex; align-items: center; gap: 8px; padding: 12px 24px;
            background: linear-gradient(135deg, var(--green), #16a34a);
            border: none; border-radius: 10px; color: white; font-weight: 600;
            font-size: 0.93rem; font-family: 'Inter',sans-serif; cursor: pointer;
            box-shadow: 0 4px 14px rgba(34,197,94,0.3); transition: all 0.22s;
        }
        .order-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,197,94,0.45); }

        /* Orders table */
        .orders-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden; margin-top: 28px;
        }
        .orders-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .orders-header h2 { font-family: 'Poppins',sans-serif; font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 9px; }
        .orders-header h2 i { color: var(--primary); }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        thead th {
            background: rgba(255,255,255,0.03); color: var(--muted);
            font-size: 0.73rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
            padding: 12px 20px; text-align: left; border-bottom: 1px solid var(--border);
        }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }
        td { padding: 12px 20px; color: var(--text); vertical-align: middle; }
        .amount-cell { color: var(--green); font-weight: 600; }
        .empty-state { text-align: center; color: var(--muted); padding: 40px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- Top bar -->
    <div class="top-bar">
        <div class="welcome-msg">
            👋 Welcome back, <span th:text="${name}">Customer</span>
        </div>
        <a href="/login" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>

    <div class="shop-main">

        <!-- Search -->
        <div class="search-card">
            <h2><i class="fa-solid fa-magnifying-glass"></i> Search & Order</h2>
            <form th:action="@{/product/search}" method="post">
                <div class="search-row">
                    <input type="text" name="productName" placeholder="Search for a dish (e.g. Chicken Biryani)..." required>
                    <button type="submit"><i class="fa-solid fa-search"></i> Search</button>
                </div>
                <div class="error-msg" th:if="${message != null}">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span th:text="${message}"></span>
                </div>
            </form>

            <!-- Product found -->
            <div th:if="${product != null}" class="product-result">
                <h3>📦 Found: <span th:text="${product.pname}" style="color:#e8572a;"></span></h3>
                <form th:action="@{/product/order}" th:object="${product}" method="post">
                    <div class="product-fields">
                        <div class="p-field">
                            <label>Product Name</label>
                            <input type="text" name="oName" th:value="${product.pname}" readonly>
                        </div>
                        <div class="p-field">
                            <label>Price (₹)</label>
                            <input type="text" name="oPrice" th:value="${product.pprice}" readonly>
                        </div>
                        <div class="p-field">
                            <label>Quantity (kg)</label>
                            <input type="number" name="oQuantity" placeholder="Min: 1" min="1" required>
                        </div>
                    </div>
                    <button type="submit" class="order-btn">
                        <i class="fa-solid fa-bag-shopping"></i> Place Order
                    </button>
                </form>
            </div>
        </div>

        <!-- Order history -->
        <div class="orders-card" th:if="${orders != null}">
            <div class="orders-header">
                <h2><i class="fa-solid fa-receipt"></i> Your Orders</h2>
            </div>
            <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
                <i class="fa-solid fa-bowl-food" style="font-size:2rem; margin-bottom:10px; display:block; opacity:0.3;"></i>
                No orders yet — search for a dish above!
            </div>
            <table th:if="${!#lists.isEmpty(orders)}">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.oName}"></td>
                        <td th:text="'₹ ' + ${order.oPrice}"></td>
                        <td th:text="${order.oQuantity}"></td>
                        <td class="amount-cell" th:text="'₹ ' + ${order.totalAmmout}"></td>
                        <td th:text="${order.orderDate}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
