<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBoard — Update Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="" th:href="@{/css/forms.css}">
</head>
<body>
    <a href="/admin/services" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

    <div class="updateAdmin">
        <div class="form-icon"><i class="fa-solid fa-user-pen"></i></div>
        <h3>Update <span>Admin</span></h3>
        <p class="form-subtitle">Edit admin account details below.</p>
        <hr class="form-divider">

        <form th:action="@{'/updatingAdmin/'+${admin.adminId}}" th:object="${admin}">
            <input type="hidden" name="adminId" th:value="${admin.adminId}">
            <div class="field-group">
                <label for="adminName">Full Name</label>
                <input type="text" id="adminName" name="adminName" th:value="${admin.adminName}" placeholder="Full name" required>
            </div>
            <div class="field-group">
                <label for="adminEmail">Email Address</label>
                <input type="email" id="adminEmail" name="adminEmail" th:value="${admin.adminEmail}" placeholder="Email" required>
            </div>
            <div class="field-group">
                <label for="adminNumber">Phone Number</label>
                <input type="tel" id="adminNumber" name="adminNumber" th:value="${admin.adminNumber}" pattern="[0-9]{10}" placeholder="10-digit number">
            </div>
            <button type="submit">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
        </form>
    </div>
</body>
</html>
