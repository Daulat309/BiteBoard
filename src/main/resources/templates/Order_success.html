<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBoard — Order Successful</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d0d0d;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .success-card {
            background: #161616;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 28px;
            padding: 56px 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease both;
        }
        .success-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #22c55e, #86efac);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .check-icon {
            width: 80px; height: 80px;
            background: rgba(34,197,94,0.12);
            border: 2px solid rgba(34,197,94,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #22c55e;
            margin: 0 auto 24px;
            animation: popIn 0.5s 0.3s ease both;
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem; font-weight: 800;
            color: #f0f0f0; margin-bottom: 8px;
        }
        .sub {
            font-size: 0.9rem; color: rgba(255,255,255,0.45);
            margin-bottom: 32px;
        }
        .amount-box {
            background: rgba(34,197,94,0.07);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
        }
        .amount-label {
            font-size: 0.78rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
            color: rgba(255,255,255,0.35); margin-bottom: 6px;
        }
        .amount-value {
            font-family: 'Poppins', sans-serif;
            font-size: 2.4rem; font-weight: 800;
            color: #22c55e;
        }
        .actions { display: flex; flex-direction: column; gap: 12px; }
        a.btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px; border-radius: 12px;
            text-decoration: none; font-weight: 600; font-size: 0.95rem;
            transition: all 0.25s; font-family: 'Inter', sans-serif;
        }
        a.btn-primary {
            background: linear-gradient(135deg, #e8572a, #c43e14);
            color: white;
            box-shadow: 0 4px 16px rgba(232,87,42,0.35);
        }
        a.btn-primary:hover { box-shadow: 0 6px 24px rgba(232,87,42,0.5); transform: translateY(-2px); }
        a.btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.65);
        }
        a.btn-outline:hover { background: rgba(255,255,255,0.09); color: #f0f0f0; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-icon"><i class="fa-solid fa-check"></i></div>
        <h2>Order Placed! 🎉</h2>
        <p class="sub">Your order has been confirmed and is being prepared.</p>

        <div class="amount-box">
            <div class="amount-label">Total Amount Paid</div>
            <div class="amount-value" th:text="'₹ ' + ${amount}">₹ 0</div>
        </div>

        <div class="actions">
            <a href="/product/back" class="btn btn-primary">
                <i class="fa-solid fa-utensils"></i> Order More
            </a>
            <a href="/login" class="btn btn-outline">
                <i class="fa-solid fa-right-from-bracket"></i> Back to Login
            </a>
        </div>
    </div>
</body>
</html>
